# ObsidianWeather configuration
# Changes apply after /obsidianweather reload. Existing weather events keep the stats they spawned with.

spawn:
  # A fresh probability roll is made at this interval. Storm tornadoes require thunder;
  # dust devils require clear weather. This is not a cooldown: a successful spawn does
  # not delay the next roll.
  check-interval-ticks: 100
  chance-per-check: 0.004
  max-concurrent-per-world: 2
  minimum-distance-from-player: 48.0
  maximum-distance-from-player: 112.0
  # Use ['*'] for every world, or list exact world names.
  affected-worlds:
    - '*'

physics:
  block-pickup-enabled: true
  entity-pickup-enabled: true
  # Controls direct periodic damage and whether thrown debris can hurt entities.
  # Normal Minecraft fall damage still applies after an entity is thrown.
  damage-enabled: true
  base-damage: 1.5
  damage-interval-ticks: 20
  # Hard per-tornado budgets. Raising these increases main-thread work.
  blocks-per-tick: 12
  variant-blocks-per-tick: 2
  entities-per-tick: 48
  # Empty means all otherwise-safe materials. If populated, only listed blocks can be lifted.
  block-whitelist: []
  # Tile entities and technically unbreakable blocks are always protected in code.
  block-blacklist:
    - BEDROCK
    - BARRIER
    - END_PORTAL_FRAME
    - REINFORCED_DEEPSLATE
    - SPAWNER
    - TRIAL_SPAWNER
    - VAULT

effects:
  # Particles and sounds are sent only to players inside this distance and fade with range.
  max-distance: 96.0
  particle-interval-ticks: 2
  sound-interval-ticks: 40

warnings:
  # Environmental particles and sounds are the intended warning system.
  # This optional nearby-only chat cue is deliberately disabled by default.
  enabled: false
  radius: 64.0
  message: 'A deep, distant rumble rolls across the land.'

towny:
  # Safe default: claimed town blocks are not destroyed or transformed.
  destroy-towns: false
  # These can remain enabled to preserve danger without structural griefing.
  damage-players-in-towns: true
  knockback-entities-in-towns: true

# Every type has an independent type-selection weight and a complete tier matrix.
# Tier keys:
#   radius: horizontal effect radius in blocks
#   movement-speed: blocks moved each server tick (some types also have a behavior multiplier)
#   lifespan-seconds: maximum active duration
#   pickup-weight-limit: 1=plants/leaves, 2=soil/sand, 3=wood, 4=stone, 6=metals, 99=obsidian
#   damage-multiplier: scales direct damage and vortex force
#   particle-density: relative client particle count
#   spawn-weight: relative chance of this tier within this type
types:
  standard:
    enabled: true
    spawn-weight: 60.0
    tiers:
      weak:
        radius: 6.0
        movement-speed: 0.12
        lifespan-seconds: 90
