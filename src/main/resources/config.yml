        particle-density: 0.65
        spawn-weight: 45.0
      moderate:
        radius: 8.0
        movement-speed: 0.15
        lifespan-seconds: 120
        pickup-weight-limit: 3
        damage-multiplier: 0.9
        particle-density: 0.85
        spawn-weight: 30.0
      strong:
        radius: 11.0
        movement-speed: 0.18
        lifespan-seconds: 150
        pickup-weight-limit: 4
        damage-multiplier: 1.2
        particle-density: 1.0
        spawn-weight: 16.0
      severe:
        radius: 14.0
        movement-speed: 0.21
        lifespan-seconds: 180
        pickup-weight-limit: 6
        damage-multiplier: 1.6
        particle-density: 1.25
        spawn-weight: 7.0
      violent:
